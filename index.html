<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{

width:100%;
overflow-x:hidden;

font-family:'Inter',sans-serif;

background:#020817;

background-image:
url('https://www.grandangoloagrigento.it/wp-content/uploads/sites/3/2026/06/ff3ce48d-73d4-4d12-ab60-cbbddcfb8853.png');

background-position:
center top;

background-repeat:
no-repeat;

background-size:
cover;

background-attachment:
fixed;

color:#fff;

}

/* =========================
SITE
========================= */

.site-wrapper{

width:100%;

max-width:1820px;

margin:0 auto;

padding:0 20px;

}

/* =========================
LAYOUT
========================= */

.layout{

display:grid;

grid-template-columns:
300px minmax(0,1200px) 300px;

gap:20px;

align-items:start;

}

/* =========================
SIDE ADV
========================= */

.side-adv{

display:flex;

flex-direction:column;

gap:20px;

position:sticky;

top:20px;

}

.side-adv img{

width:100%;

display:block;

}

/* =========================
MAIN SITE
========================= */

.main-site{

background:
rgba(2,8,23,.97);

padding:22px;

border:
1px solid rgba(255,255,255,.06);

overflow:hidden;

}

/* =========================
TOPBAR
========================= */

.topbar{

display:grid;

grid-template-columns:
auto 1fr auto;

align-items:center;

gap:22px;

padding:16px 20px;

margin-bottom:24px;

background:
rgba(2,15,40,.96);

border:
1px solid rgba(255,255,255,.08);

}

.topbar-left{

display:flex;

align-items:center;

gap:16px;

min-width:0;

}

.logo-link{

display:flex;

align-items:center;

text-decoration:none;

}

.top-logo{

height:42px;

width:auto;

display:block;

}

.topbar-divider{

width:1px;

height:38px;

background:
rgba(255,255,255,.12);

}

.topbar-title{

display:flex;

flex-direction:column;

gap:3px;

}

.speciale{

font-size:9px;

font-weight:900;

letter-spacing:1px;

opacity:.7;

}

.topbar-title h1{

font-size:24px;

font-weight:900;

line-height:1;

letter-spacing:-1px;

}

/* SEARCH */

.topbar-center{

width:100%;

min-width:0;

}

.topbar-center input{

width:100%;

height:48px;

padding:0 18px;

border:none;

outline:none;

background:#fff;

font-size:14px;

font-weight:700;

color:#00122e;

}

/* RIGHT */

.topbar-right{

display:flex;

align-items:center;

gap:14px;

justify-content:flex-end;

}

.live-box{

display:flex;

align-items:center;

gap:8px;

padding:10px 14px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:11px;

font-weight:900;

letter-spacing:1px;

white-space:nowrap;

}

.dot{

width:8px;
height:8px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.update{

font-size:12px;

opacity:.7;

white-space:nowrap;

}

/* =========================
TICKER
========================= */

.ticker-wrapper{

width:100%;

overflow:hidden;

background:
rgba(255,255,255,.04);

padding:12px 0;

margin-bottom:18px;

border-top:
1px solid rgba(255,255,255,.06);

border-bottom:
1px solid rgba(255,255,255,.06);

}

.ticker{

display:flex;

width:max-content;

animation:ticker 70s linear infinite;

}

.ticker-item{

display:flex;

align-items:center;

gap:10px;

padding:0 40px;

font-size:13px;

font-weight:700;

white-space:nowrap;

}

.ticker-time{

color:#42d3ff;

font-weight:900;

}

@keyframes ticker{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

/* =========================
LIVE TOGGLE
========================= */

.live-toggle{

display:flex;

align-items:center;

justify-content:space-between;

gap:12px;

padding:14px 18px;

margin-bottom:18px;

cursor:pointer;

background:
linear-gradient(
135deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:
1px solid rgba(255,255,255,.08);

transition:.2s;

user-select:none;

}

.live-toggle:hover{

background:
rgba(255,255,255,.08);

}

.live-toggle-left{

display:flex;

align-items:center;

gap:10px;

font-size:13px;

font-weight:900;

letter-spacing:.5px;

}

.toggle-arrow{

font-size:13px;

font-weight:900;

transition:.2s;

}

.live-panel{

overflow:hidden;

max-height:0;

opacity:0;

transition:
max-height .4s ease,
opacity .25s ease,
margin .25s ease;

margin-bottom:0;

}

.live-panel.open{

max-height:2000px;

opacity:1;

margin-bottom:30px;

}

/* =========================
SEZIONI
========================= */

.sezioni{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));

gap:14px;

margin-bottom:20px;

}

.sezione-card{

padding:16px;

background:
rgba(5,15,35,.92);

border:
1px solid rgba(255,255,255,.08);

}

.sezione-comune{

font-size:13px;

font-weight:900;

margin-bottom:8px;

}

.sezione-numeri{

font-size:28px;

font-weight:900;

}

.sezione-percentuale{

margin-top:6px;

font-size:11px;

opacity:.7;

}

/* =========================
COMUNI
========================= */

.comune{

margin-bottom:50px;

}

.comune-title{

font-size:34px;

font-weight:900;

margin-bottom:18px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:18px;

}

.grid-agrigento{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:18px;

}

/* CARD */

.card{

background:
rgba(5,15,35,.92);

border:
1px solid rgba(255,255,255,.08);

padding:18px;

position:relative;

overflow:hidden;

}

.gold{

border-top:4px solid #ffd700;

background:
linear-gradient(
135deg,
rgba(255,215,0,.16),
rgba(255,180,0,.08)
);

}

/* BADGE */

.badge{

position:absolute;

top:12px;
right:12px;

padding:5px 8px;

background:#ffd700;

color:#1a1300;

font-size:8px;

font-weight:900;

white-space:nowrap;

}

/* TOP */

.top{

display:flex;

align-items:center;

gap:10px;

margin-bottom:14px;

padding-right:88px;

min-height:58px;

}

.foto{

width:54px;
height:54px;

border-radius:50%;

object-fit:cover;

background:#fff;

flex:none;

}

.nome{

font-size:14px;

font-weight:900;

line-height:1.15;

word-break:normal;

overflow-wrap:break-word;

max-width:135px;

}

.voti{

margin-top:4px;

font-size:11px;

opacity:.7;

}

.percentuale{

font-size:38px;

font-weight:900;

margin-bottom:10px;

}

.bar{

height:10px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

}

.gold .fill{

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

}

.label{

margin-top:8px;

font-size:10px;

letter-spacing:1px;

opacity:.6;

}

/* =========================
INLINE ADV
========================= */

.inline-adv{

margin:45px 0;

display:flex;

justify-content:center;

}

.inline-adv img{

width:100%;

max-width:970px;

display:block;

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1400px){

.layout{

grid-template-columns:
1fr;

}

.side-adv{

display:none;

}

.site-wrapper{

padding:0 12px;

}

}

@media(max-width:980px){

.topbar{

grid-template-columns:
1fr;

gap:16px;

}

.topbar-left{

justify-content:center;

flex-wrap:wrap;

text-align:center;

}

.topbar-title{

text-align:center;

}

.topbar-right{

justify-content:center;

}

.grid,
.grid-agrigento{

grid-template-columns:
1fr 1fr;

gap:14px;

}

.comune-title{

font-size:28px;

}

.percentuale{

font-size:30px;

}

}

@media(max-width:700px){

.site-wrapper{

padding:0;

}

.main-site{

padding:12px;

}

.topbar{

display:flex;

flex-direction:column;

gap:14px;

padding:14px;

}

.topbar-left{

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

gap:10px;

}

.topbar-divider{

display:none;

}

.top-logo{

height:34px;

}

.topbar-title h1{

font-size:18px;

line-height:1.1;

}

.topbar-center input{

height:44px;

font-size:14px;

}

.grid,
.grid-agrigento{

grid-template-columns:
1fr;

gap:12px;

}

.comune-title{

font-size:24px;

}

.card{

padding:14px;

}

.top{

padding-right:0;

min-height:auto;

align-items:flex-start;

}

.foto{

width:48px;
height:48px;

}

.percentuale{

font-size:30px;

}

.badge{

position:relative;

top:auto;
right:auto;

margin-bottom:10px;

width:max-content;

}

}

</style>

</head>

<body>

<div class="site-wrapper">

<div class="layout">

<!-- LEFT ADV -->

<aside class="side-adv">

<img
src=""
alt=""
>

</aside>

<!-- MAIN -->

<main class="main-site">

<header class="topbar">

<div class="topbar-left">

<a
href="https://www.grandangoloagrigento.it/"
target="_blank"
class="logo-link"
>

<img
class="top-logo"
src="https://www.grandangoloagrigento.it/wp-content/themes/grandangolo-agrigento/img/logo.png"
alt=""
>

</a>

<div class="topbar-divider"></div>

<div class="topbar-title">

<div class="speciale">
SPECIALE AMMINISTRATIVE 2026
</div>

<h1>
ELEZIONI COMUNALI AGRIGENTO
</h1>

</div>

</div>

<div class="topbar-center">

<input
type="text"
id="searchInput"
placeholder="Cerca comune o candidato..."
onkeyup="filtraElementi()"
>

</div>

<div class="topbar-right">

<div class="live-box">

<div class="dot"></div>

LIVE

</div>

<div class="update" id="update">
Aggiornato...
</div>

</div>

</header>

<!-- TICKER -->

<div class="ticker-wrapper">

<div class="ticker" id="ticker"></div>

</div>

<!-- LIVE TOGGLE -->

<div class="live-toggle" onclick="toggleLivePanel()">

<div class="live-toggle-left">

<div class="dot"></div>

DATI LIVE E SEZIONI

</div>

<div class="toggle-arrow" id="toggleArrow">

▼

</div>

</div>

<!-- LIVE PANEL -->

<div class="live-panel" id="livePanel">

<div class="sezioni" id="sezioni"></div>

</div>

<!-- COMUNI -->

<div id="comuni-container"></div>

<!-- ADV -->

<div class="inline-adv">

<img
src=""
alt=""
>

</div>

</main>

<!-- RIGHT ADV -->

<aside class="side-adv">

<img
src=""
alt=""
>

</aside>

</div>

</div>

<script>

/* TOGGLE */

function toggleLivePanel(){

const panel =
document.getElementById('livePanel');

const arrow =
document.getElementById('toggleArrow');

if(
panel.classList.contains('open')
){

panel.classList.remove('open');

arrow.innerHTML = '▼';

}else{

panel.classList.add('open');

arrow.innerHTML = '▲';

}

}

/* SEARCH */

function filtraElementi(){

const input =
document.getElementById('searchInput')
.value
.toLowerCase();

const comuni =
document.querySelectorAll('.comune');

comuni.forEach(comune=>{

const nomeComune =
comune.querySelector('.comune-title')
.innerText
.toLowerCase();

const candidati =
comune.querySelectorAll('.nome');

let matchCandidato = false;

candidati.forEach(candidato=>{

if(
candidato.innerText
.toLowerCase()
.includes(input)
){

matchCandidato = true;

}

});

if(
nomeComune.includes(input)
||
matchCandidato
){

comune.style.display = 'block';

}else{

comune.style.display = 'none';

}

});

}

/* RSS */

async function caricaFeed(){

try{

const rssUrl =
'https://www.grandangoloagrigento.it/politica/feed';

const api =
'https://api.rss2json.com/v1/api.json?rss_url='
+ encodeURIComponent(rssUrl);

const response =
await fetch(api);

const data =
await response.json();

let html = '';

data.items.slice(0,12).forEach(item=>{

const orario =
new Date(item.pubDate)
.toLocaleTimeString(
'it-IT',
{
hour:'2-digit',
minute:'2-digit'
}
);

html += `

<div class="ticker-item">

<span class="ticker-time">
${orario}
</span>

<span>
${item.title}
</span>

</div>

`;

});

document.getElementById('ticker').innerHTML =
html + html;

}catch(error){

console.error(error);

}

}

/* ELEZIONI */

async function aggiorna(){

try{

const response =
await fetch(
'sindaci.json?v=' + new Date().getTime()
);

const data =
await response.json();

/* SEZIONI */

let sezioniHTML = '';

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

const perc =
comune.sezioni_totali > 0
?
(
(comune.sezioni_scrutinate /
comune.sezioni_totali)
* 100
).toFixed(0)
:
0;

sezioniHTML += `

<div class="sezione-card">

<div class="sezione-comune">
${comuneNome}
</div>

<div class="sezione-numeri">
${comune.sezioni_scrutinate}/${comune.sezioni_totali}
</div>

<div class="sezione-percentuale">
${perc}% scrutinato
</div>

</div>

`;

});

document.getElementById('sezioni').innerHTML =
sezioniHTML;

/* COMUNI */

let comuniHTML = `

<section class="comune">

<div class="comune-title">
BALLOTTAGGIO AGRIGENTO
</div>

<div style="
background:rgba(5,15,35,.92);
border:1px solid rgba(255,255,255,.08);
overflow:hidden;
">

<iframe
src="https://grandangolosettimanale.it/elezioni2026/widget/balltopbar.html?v=${Date.now()}"
style="
width:100%;
height:700px;
border:none;
display:block;
">
</iframe>

</div>

</section>

`;;

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

comune.totale_voti =
comune.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let cards = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach((c,index)=>{

const percentuale =
comune.totale_voti > 0
?
(
(c.voti / comune.totale_voti)
* 100
).toFixed(2)
:
0;

const isAgrigento =
comuneNome === 'Agrigento';

const isBallottaggio =
isAgrigento &&
(
c.nome.toLowerCase().includes('sodano')
||
c.nome.toLowerCase().includes('alonge')
);

const isWinner =
!isAgrigento &&
index === 0;

const fotoHTML =
isAgrigento
?
`
<img
class="foto"
src="${c.foto}"
alt="${c.nome}"
>
`
:
'';

cards += `

<div class="card ${isBallottaggio || isWinner ? 'gold' : ''}">

${isBallottaggio ? `
<div class="badge">
BALLOTTAGGIO
</div>
` : ''}

${isWinner ? `
<div class="badge">
SINDACO ELETTO
</div>
` : ''}

<div class="top">

${fotoHTML}

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

const gridClass =
comuneNome === 'Agrigento'
?
'grid-agrigento'
:
'grid';

comuniHTML += `

<section class="comune">

<div class="comune-title">
${comuneNome}
</div>

<div class="${gridClass}">
${cards}
</div>

</section>

`;

});

document.getElementById('comuni-container').innerHTML =
comuniHTML;

document.getElementById('update').innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}catch(error){

console.error(error);

}

}

caricaFeed();

aggiorna();

setInterval(aggiorna,5000);

setInterval(caricaFeed,600000);

</script>

</body>
</html>
